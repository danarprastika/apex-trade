services:
  backend:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DEBUG: "true"
      create_tables_on_startup: "true"
    volumes:
      - ./backend:/app
      - backend-logs:/app/logs

  celery:
    environment:
      DEBUG: "true"
    volumes:
      - ./backend:/app
      - backend-logs:/app/logs

  scheduler:
    environment:
      DEBUG: "true"
    volumes:
      - ./backend:/app
      - backend-logs:/app/logs

  frontend:
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules

networks:
  apex-network:
    external: false

volumes:
  frontend-node-modules: