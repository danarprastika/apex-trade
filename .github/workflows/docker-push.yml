name: Docker Push

on:
  push:
    branches: ["main", "develop"]
    tags: ["v*"]

permissions:
  contents: read
  packages: write

jobs:
  docker-build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set tags
        id: tags
        run: |
          echo "sha=sha-${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "branch=branch-${{ github.ref_name }}" >> $GITHUB_OUTPUT
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi
      - name: Build and push images
        run: |
          for img in backend frontend telegram-bot nginx; do
            docker build -t ghcr.io/${{ github.repository }}/apex-$img:${{ steps.tags.outputs.sha }} $img
            docker build -t ghcr.io/${{ github.repository }}/apex-$img:${{ steps.tags.outputs.branch }} $img
            docker push ghcr.io/${{ github.repository }}/apex-$img:${{ steps.tags.outputs.sha }}
            docker push ghcr.io/${{ github.repository }}/apex-$img:${{ steps.tags.outputs.branch }}
            if [[ -n "${{ steps.tags.outputs.version }}" ]]; then
              docker build -t ghcr.io/${{ github.repository }}/apex-$img:${{ steps.tags.outputs.version }} $img
              docker push ghcr.io/${{ github.repository }}/apex-$img:${{ steps.tags.outputs.version }}
            fi
          done
