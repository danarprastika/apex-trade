global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'cluster', 'service']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: 'telegram-default'
  routes:
    - match:
        severity: critical
      receiver: 'telegram-critical'
      continue: true
    - match:
        severity: high
      receiver: 'telegram-high'

receivers:
  - name: 'telegram-critical'
    telegram_configs:
      - bot_token: ${TELEGRAM_BOT_TOKEN}
        chat_id: ${TELEGRAM_CHAT_ID_CRITICAL}
        send_resolved: true
        message: '{{ template "telegram.message" . }}'

  - name: 'telegram-high'
    telegram_configs:
      - bot_token: ${TELEGRAM_BOT_TOKEN}
        chat_id: ${TELEGRAM_CHAT_ID_HIGH}
        send_resolved: true
        message: '{{ template "telegram.message" . }}'

  - name: 'telegram-default'
    telegram_configs:
      - bot_token: ${TELEGRAM_BOT_TOKEN}
        chat_id: ${TELEGRAM_CHAT_ID_DEFAULT}
        send_resolved: true
        message: '{{ template "telegram.message" . }}'

templates:
  - '/etc/alertmanager/templates/*.tmpl'