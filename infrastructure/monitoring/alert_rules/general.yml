groups:
  - name: general
    rules:
      - alert: apex_backend_down
        expr: up{job="apex-backend"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "APEX Backend is down"
          description: "The APEX backend service has been unreachable for more than 1 minute."

      - alert: apex_postgres_down
        expr: up{job="postgres-exporter"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL Exporter is down"
          description: "The PostgreSQL exporter has been unreachable for more than 1 minute."

      - alert: apex_redis_down
        expr: up{job="redis-exporter"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Redis Exporter is down"
          description: "The Redis exporter has been unreachable for more than 1 minute."

      - alert: apex_high_error_rate
        expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.05
        for: 5m
        labels:
          severity: high
        annotations:
          summary: "High HTTP error rate"
          description: "HTTP 5xx error rate is above 5% for more than 5 minutes."

      - alert: apex_high_latency
        expr: histogram_quantile(0.99, rate(http_request_duration_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: high
        annotations:
          summary: "High request latency"
          description: "99th percentile request duration is above 2 seconds for more than 5 minutes."

      - alert: apex_celery_queue_backlog
        expr: celery_tasks_pending > 1000
        for: 5m
        labels:
          severity: high
        annotations:
          summary: "Celery queue backlog"
          description: "Celery tasks pending count is above 1000 for more than 5 minutes."

      - alert: apex_database_connections_high
        expr: pg_stat_activity_count > pg_settings_max_connections * 0.8
        for: 5m
        labels:
          severity: medium
        annotations:
          summary: "High database connections"
          description: "PostgreSQL connections are above 80% of max_connections for more than 5 minutes."