policy_id: apex-audit-requirements
schema_version: 1.0
status: implemented
description: Audit requirements for APEX AI agent activity, decisions, approvals, and executions.
last_updated: 2026-06-16

audit_scope:
  - Research Agent
  - Market Agent
  - Risk Agent
  - Portfolio Agent
  - Execution Agent
  - Approval Workflow
  - Security Events
  - Permission Changes
  - Secret Access

audit_event_types:
  - event_type: agent_started
    required_fields:
      - event_id
      - timestamp
      - agent_identity
      - environment
      - model_version
      - prompt_version
      - policy_version
      - correlation_id
  - event_type: tool_call
    required_fields:
      - event_id
      - timestamp
      - agent_identity
      - tool_name
      - input_summary
      - output_summary
      - permission_check_result
      - correlation_id
  - event_type: research_output
    required_fields:
      - event_id
      - timestamp
      - agent_identity
      - data_sources
      - citations
      - confidence_score
      - prompt_version
      - model_version
      - correlation_id
  - event_type: market_signal
    required_fields:
      - event_id
      - timestamp
      - agent_identity
      - market_data_timestamp
      - signal_type
      - confidence_score
      - validation_result
      - correlation_id
  - event_type: portfolio_proposal
    required_fields:
      - event_id
      - timestamp
      - agent_identity
      - proposal_details
      - rationale
      - affected_instruments
      - expected_risk_impact
      - correlation_id
  - event_type: risk_decision
    required_fields:
      - event_id
      - timestamp
      - agent_identity
      - risk_metrics
      - limit_checks
      - decision
      - reason
      - policy_version
      - correlation_id
  - event_type: approval_decision
    required_fields:
      - event_id
      - timestamp
      - approver_identity
      - approval_tier
      - decision
      - reason
      - conditions
      - expiration_time
      - correlation_id
  - event_type: execution_request
    required_fields:
      - event_id
      - timestamp
      - agent_identity
      - order_intent
      - approved_constraints
      - venue
      - quantity
      - price_limits
      - correlation_id
  - event_type: execution_event
    required_fields:
      - event_id
      - timestamp
      - agent_identity
      - order_status
      - fills
      - partial_fills
      - slippage
      - fees
      - venue_response
      - correlation_id
  - event_type: rejection
    required_fields:
      - event_id
      - timestamp
      - rejecting_agent_or_user
      - reason
      - policy_rule
      - remediation_guidance
      - correlation_id
  - event_type: permission_change
    required_fields:
      - event_id
      - timestamp
      - requester
      - approver
      - changed_permission
      - reason
      - correlation_id
  - event_type: secret_access
    required_fields:
      - event_id
      - timestamp
      - agent_identity
      - secret_reference
      - access_result
      - correlation_id
  - event_type: security_event
    required_fields:
      - event_id
      - timestamp
      - event_type
      - severity
      - source
      - affected_agent
      - response_action
      - correlation_id

audit_storage_requirements:
  - requirement: immutable_logs
    description: Audit logs must be tamper-evident and protected from modification.
  - requirement: retention
    description: Retention must satisfy operational, compliance, and regulatory requirements.
  - requirement: correlation
    description: All events in a decision chain must share a correlation ID.
  - requirement: redaction
    description: Secrets, credentials, and sensitive personal data must be redacted.
  - requirement: time_synchronization
    description: All systems must use synchronized timestamps.
  - requirement: searchability
    description: Audit logs must be searchable by agent, user, instrument, order, policy, and time range.
  - requirement: exportability
    description: Audit logs must be exportable for compliance review and incident investigation.
  - requirement: access_control
    description: Audit logs must be readable only by authorized compliance, security, and operations roles.

review_requirements:
  - review_type: Agent permission review
    frequency: Monthly or after major policy changes
    owner: Security and platform operations
  - review_type: Approval workflow review
    frequency: Monthly
    owner: Risk, compliance, and engineering
  - review_type: Execution audit review
    frequency: Daily for production trading
    owner: Risk and operations
  - review_type: Security event review
    frequency: Continuous with daily summary
    owner: Security
  - review_type: Model and policy review
    frequency: Per release or after significant performance changes
    owner: AI governance and risk
  - review_type: Incident postmortem
    frequency: After any material failure or policy breach
    owner: Security, risk, and engineering

minimum_retention:
  development: 90_days
  staging: 180_days
  production: 7_years_or_regulatory_requirement

required_redaction:
  - credentials
  - API keys
  - exchange secrets
  - JWT secrets
  - private tokens
  - personal data
  - account numbers
  - raw prompt content containing secrets
