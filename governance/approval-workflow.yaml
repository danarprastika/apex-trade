policy_id: apex-approval-workflow
schema_version: 1.0
status: implemented
description: Approval workflow for APEX AI agent decisions and trade-related actions.
last_updated: 2026-06-16

standard_decision_flow:
  - step: 1
    actor: Research Agent
    action: Produce research findings or opportunity notes.
    output: research_output
  - step: 2
    actor: Market Agent
    action: Validate market context and produce market signals.
    output: market_signal
  - step: 3
    actor: Portfolio Agent
    action: Create allocation or rebalance proposals using approved research and market inputs.
    output: portfolio_proposal
  - step: 4
    actor: Risk Agent
    action: Evaluate proposal against limits, exposure, liquidity, concentration, drawdown, and operational risk.
    output: risk_decision
  - step: 5
    actor: Approval Workflow
    action: Determine whether the proposal is auto-approved, requires human approval, or is rejected.
    output: approval_decision
  - step: 6
    actor: Execution Agent
    action: Receive only approved order intents.
    output: approved_order_intent
  - step: 7
    actor: Execution Agent
    action: Execute within approved quantity, price, venue, time, and risk constraints.
    output: execution_event
  - step: 8
    actor: Risk Agent
    action: Perform post-trade validation.
    output: post_trade_risk_validation
  - step: 9
    actor: Audit System
    action: Record the full decision and execution chain.
    output: audit_record

approval_tiers:
  - tier: Tier 0
    action_types:
      - Research notes
      - Market summaries
      - Data quality alerts
    approval_requirement: Automated acceptance only. No trade action.
    human_approval_required: false
    risk_validation_required: false
    execution_allowed: false

  - tier: Tier 1
    action_types:
      - Market signals below impact threshold
    approval_requirement: Automated validation by Risk Agent. No human approval required.
    human_approval_required: false
    risk_validation_required: true
    execution_allowed: false

  - tier: Tier 2
    action_types:
      - Portfolio proposal within normal limits
    approval_requirement: Automated risk approval required. Human notification recommended.
    human_approval_required: false
    risk_validation_required: true
    execution_allowed: true_after_approval

  - tier: Tier 3
    action_types:
      - Portfolio proposal above normal limits
      - High exposure
      - Concentrated position
      - Unusual market condition
    approval_requirement: Human approval required before execution.
    human_approval_required: true
    required_approver_roles:
      - risk_manager
      - senior_trader
    risk_validation_required: true
    execution_allowed: true_after_approval

  - tier: Tier 4
    action_types:
      - Emergency trade
      - Risk override
      - Kill-switch event
      - Exception to policy
    approval_requirement: Senior human approval required with reason code and post-action review.
    human_approval_required: true
    required_approver_roles:
      - senior_risk_officer
      - operations_lead
    risk_validation_required: true
    execution_allowed: true_after_approval
    post_action_review_required: true

required_approval_checks:
  - check_id: schema_validation
    description: Confirms the proposal or order matches the expected structure.
  - check_id: policy_validation
    description: Confirms the action is allowed by APEX governance rules.
  - check_id: risk_validation
    description: Confirms exposure, drawdown, liquidity, concentration, margin, and volatility limits are respected.
  - check_id: data_freshness_validation
    description: Confirms market, portfolio, and risk data are current.
  - check_id: approval_authority_validation
    description: Confirms the approver has authority for the action type and size.
  - check_id: segregation_validation
    description: Confirms the proposing agent is not approving its own action.
  - check_id: idempotency_validation
    description: Confirms the action has not already been approved or executed.
  - check_id: kill_switch_validation
    description: Confirms no trading halt, market halt, or emergency stop is active.

rejection_and_escalation:
  - scenario: Risk limit breach
    required_behavior: Proposal is rejected or escalated according to severity.
  - scenario: Stale data
    required_behavior: Proposal is paused until fresh data is available.
  - scenario: Missing approval
    required_behavior: Execution is blocked.
  - scenario: Duplicate order request
    required_behavior: Duplicate is rejected or deduplicated using idempotency keys.
  - scenario: Unauthorized tool use
    required_behavior: Action is blocked and security alert is generated.
  - scenario: Approval timeout
    required_behavior: Proposal expires and must be revalidated.
  - scenario: Emergency stop
    required_behavior: All agent execution is halted immediately.

approval_expiration:
  tier_0: never
  tier_1: 5_minutes
  tier_2: 10_minutes
  tier_3: 5_minutes
  tier_4: immediate_review_required

segregation_rules:
  - rule: No agent may approve its own proposed action.
  - rule: Execution Agent may only receive approved order intents.
  - rule: Risk Agent veto decisions must be enforced automatically.
  - rule: Portfolio Agent cannot bypass Risk Agent decisions.
  - rule: Research Agent and Market Agent cannot influence execution directly.
